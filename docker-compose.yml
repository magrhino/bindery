services:
  bindery:
    image: ghcr.io/vavallee/bindery:latest
    container_name: bindery
    ports:
      - 8787:8787
    volumes:
      - ./config:/config
      - /Volumes/media/books:/books:ro
      - /Volumes/media/downloads:/downloads:ro
    environment:
      - BINDERY_LOG_LEVEL=info
    restart: unless-stopped
