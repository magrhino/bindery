name: Promote to production

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to promote to production (e.g. v1.2.0)'
        required: true
        type: string

permissions: {}

# Promotes a tagged release from dev to production by opening a PR that bumps
# charts/bindery/values.yaml on main. ArgoCD prod app picks up the change when
# the PR is merged. Run this after validating the release on the dev instance.
jobs:
  promote:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Open prod Helm deploy PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          IMAGE_TAG="${TAG#v}"
          DEPLOY_BRANCH="helm/${TAG}-deploy"
          FILE_PATH="charts/bindery/values.yaml"

          MAIN_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/git/refs/heads/main" --jq .object.sha)
          gh api "repos/${GITHUB_REPOSITORY}/git/refs" \
            -f ref="refs/heads/${DEPLOY_BRANCH}" \
            -f sha="${MAIN_SHA}" 2>/dev/null || true

          FILE_SHA=$(gh api "repos/${GITHUB_REPOSITORY}/contents/${FILE_PATH}?ref=${DEPLOY_BRANCH}" --jq .sha)
          CONTENT=$(sed "s|tag:.*|tag: \"${IMAGE_TAG}\"|" "${FILE_PATH}" | base64 -w0)
          gh api "repos/${GITHUB_REPOSITORY}/contents/${FILE_PATH}" \
            -X PUT \
            -f message="chore(deploy): promote bindery to ${IMAGE_TAG} [skip ci]" \
            -f content="${CONTENT}" \
            -f sha="${FILE_SHA}" \
            -f branch="${DEPLOY_BRANCH}"

          if ! gh pr view "${DEPLOY_BRANCH}" &>/dev/null; then
            gh pr create \
              --head "${DEPLOY_BRANCH}" \
              --base main \
              --title "chore(deploy): promote bindery to ${TAG}" \
              --body "Promotes \`${IMAGE_TAG}\` from dev to production. Merge to trigger ArgoCD prod sync."
          else
            echo "PR already exists for ${DEPLOY_BRANCH}"
          fi
          echo "Prod deploy PR ready: ${DEPLOY_BRANCH} → main (image ${IMAGE_TAG})"
