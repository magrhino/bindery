# .gitleaks.toml — Bindery-tuned Gitleaks configuration
# Extends the default gitleaks ruleset with project-specific allowlists.
# Reference: https://github.com/gitleaks/gitleaks#configuration

title = "Bindery Gitleaks Configuration"

# Extend from the default built-in rules rather than replacing them.
[extend]
useDefault = true

# ── Allow-listed paths and known fixture values ────────────────────────────────
[[allowlists]]
description = "Known safe URL hosts – example.com, localhost, loopback"
regexes = [
  '''https?://(www\.)?example\.com''',
  '''https?://localhost(:[0-9]+)?''',
  '''https?://127\.0\.0\.1(:[0-9]+)?''',
  '''https?://\[?::1\]?(:[0-9]+)?'''
]

# These exact strings are deliberate test-fixture placeholders. They appear in
# *_test.go files and carry no real credentials; the gitleaks:allow inline
# comments also suppress them, but an explicit allowlist ensures older commits
# (which predate the inline comments) are also suppressed on full-history scans.
[[allowlists]]
description = "Test-fixture placeholder credential values"
regexes = [
  '''test-api-key''',
  '''abcdefghijklmnopqrstuvwxyz012345''',
  '''admin123''',
  '''SCREAMING_TEST_KEY_[A-Z0-9_]+'''
]

# ── Stopwords ─────────────────────────────────────────────────────────────────
# Short stopwords that appear in innocuous contexts throughout the codebase.
[[allowlists]]
description = "Global stopwords for common benign patterns"
stopwords = [
  "example",
  "placeholder",
  "REPLACE_ME",
  "YOUR_KEY_HERE",
  "test-only",
  "test-secret-"
]
# Paths excluded globally from all rules.
paths = [
  '''CHANGELOG\.md''',
  '''docs/.*''',
  '''web/dist/.*''',
  '''web/node_modules/.*'''
]
