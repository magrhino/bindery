apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bindery
  namespace: argocd
  labels:
    app.kubernetes.io/name: bindery
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://github.com/vavallee/bindery
    targetRevision: main
    path: charts/bindery
    helm:
      valueFiles:
        - values.yaml
      # Cluster-specific overlay. values.yaml is neutral (ingress off,
      # example host) so the chart is reusable; this block pins the
      # live homelab deployment.
      values: |
        ingress:
          enabled: true
          host: bindery.autonomy.ninja
          entryPoints:
            - internal-https
          certResolver: internal
        nfs:
          enabled: true
          server: 192.168.1.4
          path: /volume1/MEDIA
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
