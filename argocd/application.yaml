apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bindery
  namespace: argocd
  labels:
    app.kubernetes.io/name: bindery
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  source:
    repoURL: https://github.com/vavallee/bindery
    targetRevision: main
    path: charts/bindery
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
