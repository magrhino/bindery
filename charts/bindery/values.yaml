replicaCount: 1

image:
  repository: ghcr.io/vavallee/bindery
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8787

ingress:
  enabled: true
  host: bindery.autonomy.ninja
  entryPoints:
    - internal-https
  certResolver: internal

persistence:
  config:
    enabled: true
    storageClass: longhorn
    size: 4Gi
    mountPath: /config

nfs:
  enabled: true
  server: 192.168.1.4
  path: /volume1/MEDIA
  mountPath: /media

env:
  BINDERY_PORT: "8787"
  BINDERY_DB_PATH: /config/bindery.db
  BINDERY_DATA_DIR: /config
  BINDERY_LOG_LEVEL: info
  BINDERY_DOWNLOAD_DIR: /media/downloads/complete/books
  BINDERY_LIBRARY_DIR: /media/BOOKS

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

strategy:
  type: Recreate

revisionHistoryLimit: 3
