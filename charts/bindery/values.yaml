replicaCount: 1

image:
  repository: ghcr.io/vavallee/bindery
  tag: "sha-e1b164d785981e59f8f3043b314efa4734af2a16"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8787

ingress:
  enabled: false
  host: bindery.example.com
  entryPoints:
    - internal-https
  certResolver: internal

persistence:
  config:
    enabled: true
    storageClass: longhorn
    size: 4Gi
    mountPath: /config

nfs:
  enabled: false
  server: ""
  path: /volume1/media
  mountPath: /media

env:
  BINDERY_PORT: "8787"
  BINDERY_DB_PATH: /config/bindery.db
  BINDERY_DATA_DIR: /config
  BINDERY_LOG_LEVEL: info
  BINDERY_DOWNLOAD_DIR: /downloads
  BINDERY_LIBRARY_DIR: /books

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

strategy:
  type: Recreate

revisionHistoryLimit: 3
